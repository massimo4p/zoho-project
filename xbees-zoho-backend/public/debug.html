<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>x-bees Debug</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #1a1a1a; color: #00ff00; }
        #log { background: #000; padding: 15px; height: 400px; overflow-y: auto; font-family: monospace; font-size: 12px; border-radius: 5px; }
        #status { padding: 10px; margin-bottom: 10px; background: #333; border-radius: 5px; }
    </style>
</head>
<body>
    <h2 style="color:#fff">x-bees Debug</h2>
    <div id="status">In attesa...</div>
    <div id="log">--- Log ---<br></div>
    <script>
        const log = document.getElementById('log');
        const status = document.getElementById('status');
        const add = (msg, data) => {
            const t = new Date().toLocaleTimeString();
            const d = data ? JSON.stringify(data) : '';
            log.innerHTML += `[${t}] ${msg} ${d}<br>`;
            log.scrollTop = log.scrollHeight;
            console.log(msg, data);
        };

        // Ascolta tutti i messaggi postMessage da x-bees
        window.addEventListener('message', (e) => {
            add('postMessage ricevuto', { origin: e.origin, data: e.data });
        });

        add('Pagina caricata, in attesa di messaggi da x-bees...');
    </script>
</body>
</html>
