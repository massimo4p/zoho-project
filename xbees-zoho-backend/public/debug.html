<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>x-bees Debug</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        #status { padding: 10px; border-radius: 5px; margin-bottom: 20px; font-weight: bold; background: #e0e0e0; color: #666; }
        #log { background: #000; color: #00ff00; padding: 15px; height: 300px; overflow-y: auto; font-family: monospace; font-size: 12px; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>x-bees Connect Debugger</h2>
    <div id="status">In attesa...</div>
    <div id="log">--- Log ---<br></div>
    <script type="module">
        import Client from 'https://cdn.skypack.dev/@wildix/xbees-connect';
        const log = document.getElementById('log');
        const status = document.getElementById('status');
        const add = (msg, data) => {
            const t = new Date().toLocaleTimeString();
            log.innerHTML += `[${t}] ${msg} ${data ? JSON.stringify(data) : ''}<br>`;
            log.scrollTop = log.scrollHeight;
        };
        const x = Client.getInstance();
        add('SDK init');
        x.onCallStarted((p) => { add('onCallStarted', p); status.innerText = 'IN CHIAMATA'; });
        x.onCallEnded((p) => { add('onCallEnded', p); status.innerText = 'CHIAMATA TERMINATA'; });
        x.onDaemonCallStarted((p) => { add('onDaemonCallStarted', p); });
        x.onDaemonCallFinished((p) => { add('onDaemonCallFinished', p); });
        x.onLookupAndMatchContact(async (q, resolve) => { add('onLookupAndMatchContact', q); resolve(null); });
        x.ready();
        add('ready() inviato');
        x.getContext().then(r => add('getContext', r?.payload));
    </script>
</body>
</html>
